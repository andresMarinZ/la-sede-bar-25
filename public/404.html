<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>La Sede Bar 25 — El Templo del Parche</title>
  <script>
    // Redirige rutas SPA a index.html conservando el segmento base del repo
    var segmentos = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + segmentos).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segmentos).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
